apiVersion: v1
kind: Secret
metadata:
  name: database-secret
  namespace: novaship
type: Opaque
stringData:
  POSTGRES_DB: novaship
  POSTGRES_USER: logistics_user
  POSTGRES_PASSWORD: NovaShipLab2026!
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: novaship
  labels:
    app: database
    zone: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
      zone: data
  template:
    metadata:
      labels:
        app: database
        zone: data
    spec:
      containers:
        - name: database
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: database-secret
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - logistics_user
                - -d
                - novaship
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: novaship
  labels:
    app: database
spec:
  type: ClusterIP
  selector:
    app: database
    zone: data
  ports:
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: 5432