apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-web
  namespace: novaship
  labels:
    app: portal-web
    zone: presentation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal-web
      zone: presentation
  template:
    metadata:
      labels:
        app: portal-web
        zone: presentation
    spec:
      containers:
        - name: portal-web
          image: nginx:1.27
          ports:
            - containerPort: 80
          volumeMounts:
            - name: portal-web-nginx
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: portal-web-html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: portal-web-nginx
          configMap:
            name: portal-web-nginx
        - name: portal-web-html
          configMap:
            name: portal-web-html
---
apiVersion: v1
kind: Service
metadata:
  name: portal-web
  namespace: novaship
  labels:
    app: portal-web
spec:
  type: ClusterIP
  selector:
    app: portal-web
    zone: presentation
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80