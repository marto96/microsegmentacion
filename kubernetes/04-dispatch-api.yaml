apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatch-api
  namespace: novaship
  labels:
    app: dispatch-api
    zone: internal-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatch-api
      zone: internal-services
  template:
    metadata:
      labels:
        app: dispatch-api
        zone: internal-services
    spec:
      containers:
        - name: dispatch-api
          image: python:3.12-slim
          command:
            - sh
            - -c
            - |
              cp /config/app.py /app.py
              python /app.py
          ports:
            - containerPort: 8082
          volumeMounts:
            - name: dispatch-api-code
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: dispatch-api-code
          configMap:
            name: dispatch-api-code
---
apiVersion: v1
kind: Service
metadata:
  name: dispatch-api
  namespace: novaship
  labels:
    app: dispatch-api
spec:
  type: ClusterIP
  selector:
    app: dispatch-api
    zone: internal-services
  ports:
    - name: http
      protocol: TCP
      port: 8082
      targetPort: 8082