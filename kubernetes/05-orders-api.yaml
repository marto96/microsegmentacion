apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: novaship
  labels:
    app: orders-api
    zone: business-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-api
      zone: business-services
  template:
    metadata:
      labels:
        app: orders-api
        zone: business-services
    spec:
      containers:
        - name: orders-api
          image: python:3.12-slim
          command:
            - sh
            - -c
            - |
              cp /config/app.py /app.py
              python /app.py
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: orders-api-code
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: orders-api-code
          configMap:
            name: orders-api-code
---
apiVersion: v1
kind: Service
metadata:
  name: orders-api
  namespace: novaship
  labels:
    app: orders-api
spec:
  type: ClusterIP
  selector:
    app: orders-api
    zone: business-services
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080