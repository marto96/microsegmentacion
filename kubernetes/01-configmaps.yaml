apiVersion: v1
kind: ConfigMap
metadata:
  name: portal-web-html
  namespace: novaship
data:
  index.html: |
    <!doctype html>
    <html lang="es">
    <head>
      <meta charset="utf-8">
      <title>NovaShip Logistics</title>
    </head>
    <body>
      <h1>NovaShip Logistics</h1>
      <p>Portal de seguimiento y coordinación de pedidos.</p>

      <h2>Rutas útiles</h2>
      <ul>
        <li><code>/api/health</code></li>
        <li><code>/api/summary</code></li>
      </ul>
    </body>
    </html>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: portal-web-nginx
  namespace: novaship
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        location /api/ {
            proxy_pass http://orders-api:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-api-code
  namespace: novaship
data:
  app.py: |
    from http.server import BaseHTTPRequestHandler, HTTPServer
    import json
    import socket
    from datetime import datetime, timezone

    HOST = "0.0.0.0"
    PORT = 8081
    DB_HOST = "database"
    DB_PORT = 5432

    class Handler(BaseHTTPRequestHandler):
        def send_json(self, status_code, payload):
            body = json.dumps(payload, ensure_ascii=False, indent=2).encode("utf-8")
            self.send_response(status_code)
            self.send_header("Content-Type", "application/json; charset=utf-8")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            now = datetime.now(timezone.utc).isoformat()

            if self.path in {"/", "/health"}:
                self.send_json(200, {
                    "service": "inventory-api",
                    "status": "ok",
                    "timestamp_utc": now
                })
                return

            if self.path == "/db-check":
                try:
                    with socket.create_connection((DB_HOST, DB_PORT), timeout=2):
                        self.send_json(200, {
                            "service": "inventory-api",
                            "database_connectivity": "reachable",
                            "destination": f"{DB_HOST}:{DB_PORT}",
                            "timestamp_utc": now
                        })
                except OSError as exc:
                    self.send_json(503, {
                        "service": "inventory-api",
                        "database_connectivity": "unreachable",
                        "destination": f"{DB_HOST}:{DB_PORT}",
                        "error": str(exc),
                        "timestamp_utc": now
                    })
                return

            self.send_json(404, {
                "error": "not_found",
                "path": self.path,
                "timestamp_utc": now
            })

        def log_message(self, fmt, *args):
            print(f"[inventory-api] {self.address_string()} - {fmt % args}", flush=True)

    if __name__ == "__main__":
        server = HTTPServer((HOST, PORT), Handler)
        print(f"[inventory-api] Listening on {HOST}:{PORT}", flush=True)
        server.serve_forever()
