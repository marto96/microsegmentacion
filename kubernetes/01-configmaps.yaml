apiVersion: v1
kind: ConfigMap
metadata:
  name: orders-api-code
  namespace: novaship
data:
  app.py: |
    from http.server import BaseHTTPRequestHandler, HTTPServer
    import json
    from urllib.request import urlopen
    from urllib.error import URLError
    from datetime import datetime, timezone

    HOST = "0.0.0.0"
    PORT = 8080

    INVENTORY_URL = "http://inventory-api:8081/db-check"
    DISPATCH_URL = "http://dispatch-api:8082/db-check"

    def fetch_json(url):
        try:
            with urlopen(url, timeout=3) as response:
                return {
                    "reachable": True,
                    "status_code": response.status,
                    "body": json.loads(response.read().decode("utf-8"))
                }
        except Exception as exc:
            return {
                "reachable": False,
                "error": str(exc)
            }

    class Handler(BaseHTTPRequestHandler):
        def send_json(self, status_code, payload):
            body = json.dumps(payload, ensure_ascii=False, indent=2).encode("utf-8")
            self.send_response(status_code)
            self.send_header("Content-Type", "application/json; charset=utf-8")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            now = datetime.now(timezone.utc).isoformat()

            if self.path in {"/", "/health"}:
                self.send_json(200, {
                    "service": "orders-api",
                    "status": "ok",
                    "timestamp_utc": now
                })
                return

            if self.path == "/summary":
                inventory = fetch_json(INVENTORY_URL)
                dispatch = fetch_json(DISPATCH_URL)

                overall_status = "ok" if inventory["reachable"] and dispatch["reachable"] else "degraded"

                self.send_json(200, {
                    "service": "orders-api",
                    "status": overall_status,
                    "inventory_api": inventory,
                    "dispatch_api": dispatch,
                    "timestamp_utc": now
                })
                return

            self.send_json(404, {
                "error": "not_found",
                "path": self.path,
                "timestamp_utc": now
            })

        def log_message(self, fmt, *args):
            print(f"[orders-api] {self.address_string()} - {fmt % args}", flush=True)

    if __name__ == "__main__":
        server = HTTPServer((HOST, PORT), Handler)
        print(f"[orders-api] Listening on {HOST}:{PORT}", flush=True)
        server.serve_forever()